<div class="contenedor">

    <h1>Adivina el Numero</h1>

    <div class="info">

    <p
        class="mensaje"
        [ngClass]="{
        'ganaste': mensaje === 'Ganaste'
        }"
    >
        {{ mensaje }}
    </p>

    <p class="intentos">
        Intentos: {{ intentos }}
    </p>

    </div>

    <input
    type="number"
    [(ngModel)]="numeroIngresado"
    min="1"
    max="20"
    placeholder="Ingresa un numero"
    >

    <div class="botones">

    <button
        class="probar"
        (click)="probarNumero()"
    >
        Probar
    </button>

    <button
        class="reiniciar"
        (click)="reiniciar()"
    >
        Reiniciar
    </button>

    </div>

</div>
