<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow col-12 col-md-6 col-lg-4">

    <h1 class="mb-4 text-center">Login</h1>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="email">
    </div>

    <div class="mb-3">
        <label>Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password">
    </div>

    <button class="btn btn-dark w-100" (click)="ingresar()">
        Ingresar
    </button>

    @if(mensaje){
        <p class="text-danger text-center mt-3">{{ mensaje }}</p>
    }

    </div>
</div>
