<div class="chat-container">

    <h1>Sala de Chat</h1>

    <div class="mensajes">

    <div
      *ngFor="let msg of mensajes"
        class="mensaje"
        [class.propio]="msg.usuario === usuario"
    >

        <div class="info">

        <span class="usuario">
            {{ msg.usuario }}
        </span>

        <span class="fecha">
            {{ msg.fecha | date:'shortTime' }}
        </span>

        </div>

        <div class="texto">
        {{ msg.mensaje }}
        </div>

    </div>

    </div>

    <div class="enviar-box">

    <input
        type="text"
        [(ngModel)]="nuevoMensaje"
        placeholder="Escribí un mensaje..."
    >

    <button (click)="enviarMensaje()">
        Enviar
    </button>

    </div>

</div>
