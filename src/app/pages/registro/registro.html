<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow col-12 col-md-6 col-lg-4">

    <h1 class="mb-4 text-center">Registro</h1>

    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" class="form-control" [(ngModel)]="nombre">
    </div>

    <div class="mb-3">
        <label>Apellido</label>
        <input type="text" class="form-control" [(ngModel)]="apellido">
    </div>

    <div class="mb-3">
        <label>Edad</label>
        <input type="number" class="form-control" [(ngModel)]="edad">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" [(ngModel)]="email">
    </div>

    <div class="mb-3">
        <label>Contraseña</label>
        <div class="password-container">

        <input
        [type]="mostrarPassword ? 'text' : 'password'"
        class="form-control"
        [(ngModel)]="password"
        >

        <span
        class="toggle-password"
        (click)="mostrarPassword = !mostrarPassword"
        >
        {{ mostrarPassword ? 'Ocultar' : 'Mostrar' }}
        </span>
        </div>
    </div>

    <button class="btn btn-dark w-100" (click)="registrar()">
        Registrarse
    </button>

    @if(mensaje){
        <p class="text-danger text-center mt-3">{{ mensaje }}</p>
    }

    </div>
</div>
